{% extends "base.html" %}

{% block title %}Restarting - PyRunner{% endblock %}

{% block content %}
<div class="pr-wrap">
    <div class="pr-card">
        <div class="pr-spinner" aria-hidden="true">
            <span class="pr-track"></span>
            <span class="pr-arc"></span>
            <svg class="pr-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </div>
        <h1 class="pr-title">Restarting PyRunner&hellip;</h1>
        <p class="pr-sub">Applying plugin changes. This page reloads automatically once PyRunner is back &mdash; usually a few seconds.</p>
        <div class="pr-bar" aria-hidden="true"><span></span></div>
        <p id="pr-slow" class="pr-slow">Taking longer than usual. <a href="{% url 'cpanel:plugin_list' %}">Reload now</a>.</p>
    </div>
</div>

<style>
    .pr-wrap{min-height:calc(100vh - 4rem);display:grid;place-items:center;padding:2.5rem 1rem}
    .pr-card{width:100%;max-width:30rem;text-align:center;background:var(--panel);
        border:1px solid var(--line);border-radius:1.25rem;padding:3rem 2.5rem 2.75rem;
        box-shadow:0 24px 60px -28px rgba(0,0,0,.55)}
    .pr-spinner{position:relative;width:4.25rem;height:4.25rem;margin:0 auto 1.9rem}
    .pr-track{position:absolute;inset:0;border-radius:9999px;border:2px solid var(--line-soft)}
    .pr-arc{position:absolute;inset:0;border-radius:9999px;border:2px solid transparent;
        border-top-color:var(--warn);border-right-color:var(--warn);
        animation:pr-spin .85s linear infinite}
    .pr-glyph{position:absolute;inset:0;margin:auto;width:1.6rem;height:1.6rem;color:var(--warn)}
    .pr-title{font-size:1.5rem;line-height:1.2;font-weight:600;letter-spacing:-.01em;
        color:var(--text);margin:0 0 .65rem}
    .pr-sub{font-size:.875rem;line-height:1.65;color:var(--muted);margin:0 auto;max-width:24rem}
    .pr-bar{margin-top:2.1rem;height:4px;border-radius:9999px;background:var(--line-soft);overflow:hidden}
    .pr-bar>span{display:block;height:100%;width:38%;border-radius:9999px;background:var(--warn);
        animation:pr-slide 1.4s ease-in-out infinite}
    .pr-slow{font-size:.75rem;color:var(--faint);margin:1.6rem 0 0;display:none}
    .pr-slow a{color:var(--ok);text-decoration:none}
    .pr-slow a:hover{text-decoration:underline}
    @keyframes pr-spin{to{transform:rotate(360deg)}}
    @keyframes pr-slide{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
    @media (prefers-reduced-motion:reduce){
        .pr-arc,.pr-bar>span{animation:none}
        .pr-bar>span{width:100%}
    }
</style>

<script>
(function () {
    var target = "{% url 'cpanel:plugin_list' %}";
    var attempts = 0;
    var slowAfter = 40;  // ~60s -> reveal manual link, but keep polling

    // Only navigate once a COMPLETE page is served. During boot a worker can
    // briefly answer with an empty/partial body; requiring </html> avoids
    // landing on a blank/broken page.
    function isComplete(html) {
        return html && html.indexOf("</html>") !== -1;
    }

    function poll() {
        attempts++;
        if (attempts === slowAfter) {
            document.getElementById("pr-slow").style.display = "block";
        }
        fetch(target, { cache: "no-store", credentials: "same-origin" })
            .then(function (r) { return r.ok ? r.text() : Promise.reject(); })
            .then(function (html) {
                if (isComplete(html)) {
                    window.location.href = target;
                } else {
                    setTimeout(poll, 1500);
                }
            })
            .catch(function () { setTimeout(poll, 1500); });
    }

    setTimeout(poll, 3000);  // let the container begin shutting down first
})();
</script>
{% endblock %}
