name: Bug Report
description: Report a problem with PyRunner
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do **not** report
        security vulnerabilities here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PyRunner version
      description: From `pyrunner/version.py` or the footer/UI.
      placeholder: e.g. 1.13.0
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose
        - Docker (single container)
        - Bare / local (runserver or gunicorn)
        - Other
    validations:
      required: true
  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - SQLite (default)
        - Postgres
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (redact secrets). Rendered as code.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — proxy setup, OS, browser, screenshots.
